name: Build and push

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Parse upstream version from Dockerfile
        id: version
        run: |
          echo "tag=$(grep -m1 '^FROM ' Dockerfile | sed 's/.*://')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/furan917/taskchampion-sync-server:latest
            ghcr.io/furan917/taskchampion-sync-server:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
